DWAPlannerROS:
  # 速度限制: 差速小车，限制最大速度和转向
  max_vel_x: 0.35
  min_vel_x: 0.0
  max_vel_y: 0.0
  min_vel_y: 0.0
  max_vel_trans: 0.35
  min_vel_trans: 0.0
  max_vel_theta: 1.0
  min_vel_theta: 0.0

  # 加速度限制
  acc_lim_x: 2.5
  acc_lim_y: 0.0
  acc_lim_theta: 3.2

  xy_goal_tolerance: 0.25
  yaw_goal_tolerance: 0.2
  latch_xy_goal_tolerance: true

  # 仿真时间: 不宜过短也不宜过长，让它能顺利规划圆弧
  sim_time: 1.7
  sim_granularity: 0.05
  vx_samples: 20
  vy_samples: 0
  vth_samples: 40

  # ★核心解决打转问题★
  # (1) 恢复适中的权重，过高的 path_distance_bias 配合短前的点会导致小车在拐角时硬往墙角钻
  # (2) 配合 fds_planner 源码中 160.0 代价的修改 (使得全局路径远离墙根)
  path_distance_bias: 32.0    
  goal_distance_bias: 24.0
  occdist_scale: 0.02         

  forward_point_distance: 0.325 # 前视点恢复，让旋转惩罚能够有效评估，不至于必须直线冲锋
  stop_time_buffer: 0.2
  
  oscillation_reset_dist: 0.05
  prune_plan: true
